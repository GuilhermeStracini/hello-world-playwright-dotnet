name: Infisical secrets check

on:
  workflow_dispatch:
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  
  secrets-scan:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Infisical secrets check
        uses: guibranco/github-infisical-secrets-check-action@5c5947a9fe7fe42a61c1cb84c89a763d016dd043 # v5.2.1
